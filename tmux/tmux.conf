# Use vim keybindings in copy mode
setw -g mode-keys vi

# Make selecting and copying feel exactly like Neovim
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Remap split panes to feel more intuitive (Optional but helpful)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Copy directly to system clipboard using xclip
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -sel clipboard -in"
